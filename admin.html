<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — eduspark</title>
  <link rel="icon" href="images/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/premium.css" />
  <style>
    /* Admin specific overrides */
    .admin-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 24px;
    }
    
    .users-table-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow-x: auto;
      box-shadow: var(--shadow);
    }

    .users-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .users-table th, .users-table td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    .users-table th {
      background: rgba(255,255,255,0.02);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .users-table tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    .badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(255,255,255,0.1);
    }

    .badge.webdev { background: rgba(0, 112, 243, 0.2); color: #3291FF; }
    .badge.datascience { background: rgba(16, 185, 129, 0.2); color: #34D399; }
    .badge.aiml { background: rgba(245, 166, 35, 0.2); color: #FBBF24; }

    .loading-state {
      padding: 40px;
      text-align: center;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <!-- Top Navigation -->
  <nav class="top-nav">
    <div class="nav-brand" style="margin-top: 4px;">
      <img src="images/logo.png" alt="EduSpark Admin" style="height: 48px; width: auto;" />
      <span style="margin-left: 10px;">Admin Dashboard</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">← Back to App</a></li>
    </ul>
  </nav>

  <!-- Main Content Area -->
  <main class="admin-container">
    <div class="welcome-banner" style="margin-bottom: 40px; padding: 40px;">
      <h2 style="font-size: 2rem; margin-bottom: 8px;">Members Directory</h2>
      <p style="color: var(--text-secondary); font-size: 1.1rem;">Monitor your users, their progress, and active paths.</p>
      
      <div style="display: flex; gap: 20px; margin-top: 24px;">
        <div class="stat-card" style="padding: 16px 24px; min-width: 150px;">
          <div class="stat-value" id="totalUsersCount" style="font-size: 1.8rem; color: var(--accent-light);">...</div>
          <div class="stat-label">Total Members</div>
        </div>
      </div>
    </div>

    <div class="users-table-container">
      <table class="users-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Career Goal</th>
            <th>Skill Level</th>
            <th>Lessons</th>
            <th>Avg Score</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr>
            <td colspan="7" class="loading-state">Loading members securely from MongoDB...</td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>

  <script src="js/admin.js"></script>
</body>
</html>
